<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Weather Experience</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Dynamic Background -->
  <div id="bgLayer" class="bg-layer bg-clear-day"></div>
  
  <!-- Weather Effects Container -->
  <div id="weatherEffects" class="weather-effects"></div>

  <div class="app-container">
    <div class="glass-panel">
      <h1><i class="fas fa-cloud-sun"></i> Weather Experience</h1>
      
      <!-- Info Banner -->
      <div class="info-banner">
        <p class="info-text"><i class="fas fa-globe-americas"></i> Enter a city name to experience dynamic weather visualization</p>
        <p class="hint-text"><i class="fas fa-keyboard"></i> Type at least 3 characters to see suggestions</p>
      </div>
      
      <div class="search-container">
        <div class="search-box">
          <input 
            type="text" 
            id="cityInput" 
            placeholder="Enter city name (e.g., London, Tokyo, New York)" 
            autocomplete="off"
          />
          <button onclick="getWeather()" class="search-btn"><i class="fas fa-search"></i> Search</button>
          <button onclick="resetApp()" class="reset-btn" title="Clear search"><i class="fas fa-undo"></i> Reset</button>
        </div>
        <!-- Autocomplete Dropdown -->
        <div id="autocompleteList" class="autocomplete-list"></div>
      </div>

      <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
      </div>

      <!-- Did You Mean Section -->
      <div id="suggestionsSection" class="suggestions-section" style="display: none;">
        <p class="suggestions-title"><i class="fas fa-lightbulb"></i> Did you mean?</p>
        <div id="suggestionsList" class="suggestions-grid"></div>
      </div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Fetching weather data...</p>
      </div>

      <div id="weatherContent">
        <div class="initial-state">
          <i class="fas fa-cloud-sun-rain"></i>
          <p class="welcome-text">Welcome to Weather Experience</p>
          <p class="sub-text">Search any city worldwide to get real-time weather updates</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
